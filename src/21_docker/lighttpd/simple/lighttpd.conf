# Root-Verzeichnis und Port
server.document-root = "/var/www/html"
server.port = 80
server.bind = "0.0.0.0"

# Verzeichnisauflistung aktivieren
dir-listing.activate = "enable"

# MIME-Typen manuell definieren (inklusive UTF-8 für HTML)
mimetype.assign = (
  ".html"  => "text/html; charset=utf-8",
  ".css"   => "text/css",
  ".js"    => "application/javascript",
  ".json"  => "application/json",
  ".png"   => "image/png",
  ".jpg"   => "image/jpeg",
  ".jpeg"  => "image/jpeg",
  ".gif"   => "image/gif",
  ".svg"   => "image/svg+xml",
  ".woff"  => "font/woff",
  ".woff2" => "font/woff2",
  ".ttf"   => "font/ttf",
  ".eot"   => "application/vnd.ms-fontobject",
  ".ico"   => "image/x-icon"
)

# Standard-Log-Pfade (optional, aber praktisch für Schulung)
server.errorlog = "/var/log/lighttpd/error.log"
accesslog.filename = "/var/log/lighttpd/access.log"
